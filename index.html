<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Biomech Retro Horror</title>
    <style>
      :root {
        color-scheme: dark;
        --safe-area-inset-top: env(safe-area-inset-top, 0px);
        --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
      }


      html,
      body {
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: #120e0d;
        overflow: hidden;
        overscroll-behavior: none;
      }

      #game-root {
        width: min(100vw, 960px);
        height: min(100vh, 540px);
        height: min(100dvh, 540px);
        touch-action: none;
        overflow: hidden;
      }

      canvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
        touch-action: none;
        overflow: hidden;
      }

      @media (orientation: portrait) and (max-width: 900px) {
        #game-root {
          width: 100vw;
          height: 100dvh;
          max-height: 100dvh;
        }
      }
    </style>
  </head>
  <body>
    <div id="game-root"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
